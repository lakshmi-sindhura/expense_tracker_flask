<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
</head>
<body>

<h2>Edit Expense</h2>

<form action="/update/{{ expense[0] }}" method="POST">

    <label>Amount:</label><br>
    <input type="number" name="amount" value="{{ expense[1] }}" required><br><br>

    <label>Category:</label><br>
    <input type="text" name="category" value="{{ expense[2] }}" required><br><br>

    <label>Description:</label><br>
    <input type="text" name="description" value="{{ expense[3] }}"><br><br>

    <label>Date:</label><br>
    <input type="date" name="date" value="{{ expense[4] }}" required><br><br>

    <button type="submit">Update</button>
</form>

</body>
</html>
